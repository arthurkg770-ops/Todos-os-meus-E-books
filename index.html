<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Portal de Sites</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px;
}

header h1 {
    font-size: 32px;
    color: gold;
}

header p {
    color: #ccc;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1000px;
    margin: auto;
}

.card {
    background: #111;
    border: 1px solid gold;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px gold;
}

.card a {
    text-decoration: none;
    color: white;
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

.button {
    background: gold;
    color: black;
    padding: 10px;
    border-radius: 8px;
    display: inline-block;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    <h1>🌐 Meu Portal de Sites</h1>
    <p>Todos os meus links importantes em um só lugar</p>
</header>

<div class="container">

    <div class="card">
        <h3>Site 1</h3>
        <p>Descrição do site</p>
        <a class="button" href="https://google.com" target="_blank">Acessar</a>
    </div>

    <div class="card">
        <h3>Site 2</h3>
        <p>Descrição do site</p>
        <a class="button" href="https://youtube.com" target="_blank">Acessar</a>
    </div>

    <div class="card">
        <h3>Site 3</h3>
        <p>Descrição do site</p>
        <a class="button" href="https://instagram.com" target="_blank">Acessar</a>
    </div>

    <div class="card">
        <h3>Adicionar mais</h3>
        <p>Duplique esse bloco para novos sites</p>
        <a class="button" href="#" target="_blank">Editar</a>
    </div>

</div>

</body>
</html>
