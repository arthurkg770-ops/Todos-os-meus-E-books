<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Links Úteis</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #ddd;
            margin-bottom: 15px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { margin-bottom: 30px; color: #64748b; }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="background: #2563eb; width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">🚀</div>
        
        <h1>Meus Projetos</h1>
        <p>Confira meus sites favoritos e redes sociais</p>

        <div class="links-container">
            <a href="https://google.com" target="_blank" class="link-card">Google</a>
            <a href="https://github.com" target="_blank" class="link-card">Meu GitHub</a>
            <a href="https://linkedin.com" target="_blank" class="link-card">LinkedIn Profissional</a>
            <a href="#" target="_blank" class="link-card">Meu Portfólio</a>
        </div>
    </div>

</body>
</html>
